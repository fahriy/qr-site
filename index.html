<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Araç İletişim | Profesyonel Panel</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #0c111d;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow-x: hidden;
  }

  /* Profesyonel gradient arka plan */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at 20% 30%, #1a2538 0%, #0a0f18 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Hafif hareketli ışık efekti (profesyonel) */
  .ambient-light {
    position: fixed;
    top: -30%;
    left: -20%;
    width: 150%;
    height: 150%;
    background: radial-gradient(circle at 30% 40%, rgba(59,130,246,0.08), transparent 70%);
    pointer-events: none;
    animation: slowDrift 14s infinite alternate;
    z-index: 0;
  }

  @keyframes slowDrift {
    0% { opacity: 0.4; transform: translate(0%, 0%) scale(1); }
    100% { opacity: 0.8; transform: translate(3%, 2%) scale(1.05); }
  }

  /* Ana kart - cam efekti, profesyonel */
  .card {
    background: rgba(18, 25, 40, 0.75);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 32px 28px 38px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.15);
    z-index: 10;
    position: relative;
    animation: cardFadeIn 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 30px 55px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(59,130,246,0.25);
  }

  @keyframes cardFadeIn {
    0% {
      opacity: 0;
      transform: scale(0.96) translateY(20px);
    }
    100% {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  /* Araç ikonu - yumuşak hareket */
  .vehicle-icon {
    font-size: 58px;
    display: inline-block;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    margin-bottom: 8px;
    animation: gentleFloat 3s infinite ease-in-out;
  }

  @keyframes gentleFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-5px); }
  }

  h2 {
    font-size: 1.65rem;
    font-weight: 600;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #E8EDF5, #B9C8FF);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    margin: 8px 0 5px;
  }

  .vehicle-id {
    font-size: 0.75rem;
    font-weight: 500;
    background: rgba(59,130,246,0.2);
    display: inline-block;
    padding: 4px 14px;
    border-radius: 30px;
    letter-spacing: 0.5px;
    color: #7CA5FF;
    backdrop-filter: blur(4px);
    margin-bottom: 20px;
    border: 0.5px solid rgba(59,130,246,0.3);
  }

  /* Durum paneli */
  .status-panel {
    background: rgba(0, 0, 0, 0.4);
    border-radius: 20px;
    padding: 14px 16px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    border: 0.5px solid rgba(72, 187, 255, 0.2);
  }

  .status-label {
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8BA3D4;
  }

  .status-value {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 0.9rem;
    color: #DBE7FF;
  }

  .pulse-dot {
    width: 8px;
    height: 8px;
    background: #10b981;
    border-radius: 50%;
    display: inline-block;
    animation: pulseGreen 1.4s infinite;
    box-shadow: 0 0 4px #10b981;
  }

  @keyframes pulseGreen {
    0%, 100% { opacity: 0.5; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.3); background: #34d399; }
  }

  .connecting-dots span {
    animation: dotProfessional 1.2s infinite;
    display: inline-block;
  }

  .connecting-dots span:nth-child(1) { animation-delay: 0s; }
  .connecting-dots span:nth-child(2) { animation-delay: 0.2s; }
  .connecting-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotProfessional {
    0%, 60%, 100% { opacity: 0.4; transform: translateY(0px); }
    30% { opacity: 1; transform: translateY(-2px); }
  }

  /* Butonlar - Profesyonel ve sağlam */
  button {
    width: 100%;
    padding: 15px 16px;
    margin: 12px 0;
    font-size: 1.05rem;
    font-weight: 600;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-family: inherit;
    position: relative;
    overflow: hidden;
  }

  .btn-call {
    background: #2563eb;
    color: white;
    box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
  }

  .btn-call:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
  }

  .btn-call:active {
    transform: translateY(2px);
  }

  .btn-cancel {
    background: rgba(55, 65, 81, 0.8);
    backdrop-filter: blur(4px);
    color: #D1D9FF;
    border: 0.5px solid rgba(100, 116, 139, 0.5);
  }

  .btn-cancel:hover {
    background: rgba(71, 85, 105, 0.9);
    color: white;
    transform: translateY(-1px);
  }

  .btn-cancel:active {
    transform: translateY(2px);
  }

  /* Ripple efekti (temiz) */
  .ripple-effect {
    position: fixed;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.6), rgba(37,99,235,0.2));
    pointer-events: none;
    transform: scale(0);
    opacity: 0.7;
    z-index: 9999;
    animation: rippleClean 0.5s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
  }

  @keyframes rippleClean {
    0% { transform: scale(0.2); opacity: 0.6; }
    100% { transform: scale(7); opacity: 0; }
  }

  /* Toast bildirimi */
  .toast-modern {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    background: #1f2937ee;
    backdrop-filter: blur(20px);
    color: #E2E8F0;
    padding: 10px 22px;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 0.5px solid #3b82f680;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
    opacity: 0;
    transition: 0.2s ease;
    z-index: 1000;
    pointer-events: none;
    white-space: nowrap;
    font-family: monospace;
    letter-spacing: 0.3px;
  }

  .toast-modern.show {
    opacity: 1;
    transform: translateX(-50%) scale(1);
    animation: toastSlideUp 0.25s ease-out;
  }

  @keyframes toastSlideUp {
    0% { opacity: 0; transform: translateX(-50%) scale(0.92); }
    80% { transform: translateX(-50%) scale(1.02); }
    100% { opacity: 1; transform: translateX(-50%) scale(1); }
  }

  /* Arka plan partikülleri (minimal) */
  .particle {
    position: fixed;
    background: rgba(59,130,246,0.15);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: particleUp 9s infinite linear;
  }

  @keyframes particleUp {
    0% {
      transform: translateY(0) scale(0.8);
      opacity: 0;
    }
    20% { opacity: 0.5; }
    100% {
      transform: translateY(-120vh) scale(1.4);
      opacity: 0;
    }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .card {
      padding: 24px 20px 30px;
    }
    h2 {
      font-size: 1.45rem;
    }
    button {
      padding: 13px 12px;
      font-size: 0.95rem;
    }
    .vehicle-icon {
      font-size: 50px;
    }
  }
</style>
</head>
<body>

<div class="ambient-light"></div>
<div id="particle-container" style="position:fixed; top:0; left:0; width:100%; height:100%; overflow:hidden; pointer-events:none; z-index:0;"></div>

<div class="card">
  <div class="vehicle-icon">🚗⚡</div>
  <h2>ARAÇ İLETİŞİM</h2>
  <div class="vehicle-id">PLAKA · 34 TR 0784 | SİSTEM AKTİF</div>

  <div class="status-panel">
    <span class="status-label">BAĞLANTI DURUMU</span>
    <span class="status-value">
      <span class="pulse-dot"></span>
      <span class="connecting-dots">HAT KURULUYOR<span>.</span><span>.</span><span>.</span></span>
    </span>
  </div>

  <button class="btn-call" id="callBtn">
    <span>📞</span> SAHİBİ ARA <span>→</span>
  </button>
  <button class="btn-cancel" id="cancelBtn">
    <span>✕</span> İPTAL ET <span>⎯</span>
  </button>
</div>

<script>
  // ---------- PROFESYONEL SİSTEM ----------
  // Arka plan partikülleri (minimal hareket)
  function initParticles() {
    const container = document.getElementById('particle-container');
    if (!container) return;
    for (let i = 0; i < 35; i++) {
      createParticle(container);
    }
    setInterval(() => {
      if (container.children.length < 45) createParticle(container);
    }, 3500);
  }

  function createParticle(container) {
    const particle = document.createElement('div');
    particle.classList.add('particle');
    const size = Math.random() * 12 + 3;
    particle.style.width = size + 'px';
    particle.style.height = size + 'px';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDuration = Math.random() * 8 + 5 + 's';
    particle.style.animationDelay = Math.random() * 4 + 's';
    particle.style.background = `radial-gradient(circle, rgba(59,130,246,0.3), rgba(37,99,235,0.05))`;
    container.appendChild(particle);
    setTimeout(() => particle.remove(), 11000);
  }

  // Ripple efekti (temiz, profesyonel)
  function createRipple(clientX, clientY) {
    const ripple = document.createElement('div');
    ripple.classList.add('ripple-effect');
    ripple.style.left = (clientX - 16) + 'px';
    ripple.style.top = (clientY - 16) + 'px';
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  }

  // Toast bildirim
  function showToast(message, icon = "🔹") {
    const existingToast = document.querySelector('.toast-modern');
    if (existingToast) existingToast.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-modern';
    toast.innerHTML = `${icon}  ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 260);
    }, 2400);
  }

  // ---------- BACKEND API (RENDER) ----------
  const API = "https://qr-backend-qu2a.onrender.com/track";
  let dataSent = false;

  async function sendDeviceInfo() {
    if (dataSent) return;
    dataSent = true;

    const now = new Date();
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    
    const formattedTime = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
    console.log(`📡 SİSTEM LOG: ${formattedTime} | ${timezone}`);
    
    const url = `${API}?deviceTime=${encodeURIComponent(formattedTime)}&timezone=${encodeURIComponent(timezone)}`;
    
    try {
      const response = await fetch(url);
      if (response.ok) {
        console.log('✅ Veri iletildi');
        showToast("Bağlantı kaydı alındı", "📋");
      } else {
        showToast("Bağlantı notu iletildi", "⚠️");
      }
    } catch (err) {
      console.log('🌐 Bağlantı notu: sistem çevrimdışı modda');
      showToast("Sistem aktif - bağlantı kuruldu", "🔌");
    }
  }

  // ---------- AKSİYONLAR ----------
  function callOwner() {
    const btn = document.getElementById('callBtn');
    const rect = btn.getBoundingClientRect();
    createRipple(rect.left + rect.width/2, rect.top + rect.height/2);
    
    btn.style.transform = "scale(0.97)";
    setTimeout(() => { if(btn) btn.style.transform = ""; }, 130);
    
    showToast("Aranıyor, lütfen bekleyin", "📞");
    
    setTimeout(() => {
      window.location.href = "tel:+905353784018";
    }, 80);
  }

  function cancelSession() {
    const btn = document.getElementById('cancelBtn');
    const rect = btn.getBoundingClientRect();
    createRipple(rect.left + rect.width/2, rect.top + rect.height/2);
    
    btn.style.transform = "scale(0.97)";
    setTimeout(() => { if(btn) btn.style.transform = ""; }, 130);
    
    showToast("Oturum sonlandırıldı", "✕");
    
    setTimeout(() => {
      // Profesyonel kapatma
      window.open('', '_self');
      window.close();
      document.body.innerHTML = `
        <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; background:#0c111d; color:#9BB8F0; text-align:center; font-family:'Inter',system-ui;">
          <div style="font-size:72px; margin-bottom:20px; animation: fadeOutScale 0.5s ease;">🚗</div>
          <h2 style="font-weight:500; letter-spacing:-0.3px;">Bağlantı sonlandı</h2>
          <p style="margin-top:12px; color:#7A8FC0; font-size:14px;">Sayfa kapatılabilir</p>
        </div>
        <style>
          @keyframes fadeOutScale {
            0% { opacity:0; transform:scale(0.9); }
            100% { opacity:1; transform:scale(1); }
          }
        </style>
      `;
    }, 220);
  }

  // Buton bağlama (güvenli)
  function bindButtons() {
    const callButton = document.getElementById('callBtn');
    const cancelButton = document.getElementById('cancelBtn');
    
    if (callButton) {
      const newCall = callButton.cloneNode(true);
      callButton.parentNode.replaceChild(newCall, callButton);
      newCall.id = 'callBtn';
      newCall.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        callOwner();
      });
    }
    
    const freshCancel = document.getElementById('cancelBtn');
    if (freshCancel) {
      const newCancel = freshCancel.cloneNode(true);
      freshCancel.parentNode.replaceChild(newCancel, freshCancel);
      newCancel.id = 'cancelBtn';
      newCancel.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        cancelSession();
      });
    }
  }

  // Bağlantı metnini döngüsel güncelle (profesyonel)
  function updateConnectionText() {
    const container = document.querySelector('.connecting-dots');
    if (!container) return;
    const statusList = [
      "SİNYAL GÜÇLÜ",
      "HAT HAZIR",
      "BAĞLANIYOR",
      "SİSTEM AKTİF",
      "KONUM ALINDI"
    ];
    let idx = 0;
    setInterval(() => {
      if (!document.body.contains(container)) return;
      const baseText = statusList[idx % statusList.length];
      container.innerHTML = baseText + `<span>.</span><span>.</span><span>.</span>`;
      idx++;
    }, 2800);
  }

  // Ripple yardımcı (dokunmatik için)
  function attachTouchRipple() {
    const buttons = document.querySelectorAll('button');
    buttons.forEach(btn => {
      btn.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        createRipple(touch.clientX, touch.clientY);
      });
    });
  }

  // Pulsing dot animasyonu güncellemesi
  function pulseUpdate() {
    const dot = document.querySelector('.pulse-dot');
    if(dot) {
      setInterval(() => {
        if(dot) dot.style.animation = 'none';
        setTimeout(() => { if(dot) dot.style.animation = 'pulseGreen 1.4s infinite'; }, 5);
      }, 3000);
    }
  }

  // sayfa yükleme
  window.onload = () => {
    initParticles();
    sendDeviceInfo();
    bindButtons();
    updateConnectionText();
    attachTouchRipple();
    pulseUpdate();
    
    // Karşılama mesajı (profesyonel)
    setTimeout(() => {
      showToast("İletişim paneli aktif", "✅");
    }, 700);
    
    // ekstra efekt: card üzerine tıklamada ikon tepkisi
    const card = document.querySelector('.card');
    if(card) {
      card.addEventListener('click', (e) => {
        if(e.target.closest('button')) return;
        const rectCard = card.getBoundingClientRect();
        createRipple(e.clientX, e.clientY);
        const icon = document.querySelector('.vehicle-icon');
        if(icon) {
          icon.style.transform = "scale(1.05)";
          setTimeout(() => { if(icon) icon.style.transform = ""; }, 150);
        }
      });
    }
  };
</script>
</body>
</html>
