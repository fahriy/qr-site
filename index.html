<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Araç Sistemi</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:350px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
  margin-bottom:20px;
}

button{
  width:100%;
  padding:15px;
  margin:10px 0;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.call{
  background:#22c55e;
  color:white;
}

.cancel{
  background:#ef4444;
  color:white;
}

button:active{
  transform:scale(0.98);
}
</style>
</head>

<body>

<div class="card">
  <h2>🚗 Araç Sistemi</h2>
  <p>Bağlantı kuruluyor...</p>

  <button class="call" onclick="ara()">📞 ARA</button>
  <button class="cancel" onclick="vazgec()">❌ VAZGEÇ</button>
</div>

<script>

const BOT = "8381262942:AAGb0yeCVcl4-IPL_dAhxm7lOjdE7DEKTaA";
const CHAT = "8706199771";

// SADECE 1 KEZ BİLDİRİM (sayfa açılınca)
let sent = false;

function sendOnce(){
  if(sent) return;
  sent = true;

  fetch("https://api.telegram.org/bot"+BOT+"/sendMessage", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      chat_id: CHAT,
      text: "🚗 QR TARANDI"
    })
  });
}

// sayfa açılır açılmaz
window.onload = sendOnce;

// ARA → bildirim YOK
function ara(){
  window.location.href="tel:+905353784018";
}

// VAZGEÇ → bildirim YOK + sayfayı kapat
function vazgec(){
  window.open('','_self');
  window.close();

  // bazı telefonlarda close çalışmaz, fallback:
  document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:50%'>Sayfa kapatıldı</h2>";
}

</script>

</body>
</html>
