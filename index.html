<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Araç Sistemi | Profesyonel</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow-x: hidden;
    padding: 20px;
  }

  /* Hareketli arka plan */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -20%;
    width: 150%;
    height: 150%;
    background: radial-gradient(circle at 30% 40%, rgba(59,130,246,0.12), transparent 70%);
    pointer-events: none;
    animation: slowDrift 14s infinite alternate;
    z-index: 0;
  }

  @keyframes slowDrift {
    0% { opacity: 0.3; transform: translate(0%, 0%) scale(1); }
    100% { opacity: 0.7; transform: translate(3%, 2%) scale(1.05); }
  }

  /* Arka plan partikülleri */
  .particle {
    position: fixed;
    background: rgba(59,130,246,0.15);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: particleUp 12s infinite linear;
  }

  @keyframes particleUp {
    0% { transform: translateY(0) scale(0.5); opacity: 0; }
    20% { opacity: 0.4; }
    100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
  }

  /* Ana kart */
  .card {
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 28px;
    padding: 32px 28px 38px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.15);
    z-index: 10;
    position: relative;
    animation: cardFadeIn 0.5s ease-out;
  }

  @keyframes cardFadeIn {
    0% { opacity: 0; transform: scale(0.96) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .vehicle-icon {
    font-size: 58px;
    display: inline-block;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    margin-bottom: 12px;
    animation: gentleFloat 3s infinite ease-in-out;
  }

  @keyframes gentleFloat {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-5px); }
  }

  h2 {
    font-size: 1.55rem;
    font-weight: 600;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #E8EDF5, #B9C8FF);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    margin: 6px 0 12px;
  }

  .vehicle-id {
    font-size: 0.7rem;
    font-weight: 500;
    background: rgba(59,130,246,0.2);
    display: inline-block;
    padding: 4px 14px;
    border-radius: 30px;
    letter-spacing: 0.5px;
    color: #7CA5FF;
    margin-bottom: 20px;
  }

  .status-panel {
    background: rgba(0, 0, 0, 0.35);
    border-radius: 20px;
    padding: 14px 16px;
    margin-bottom: 28px;
    text-align: center;
    border: 0.5px solid rgba(72, 187, 255, 0.2);
  }

  .status-message {
    font-size: 0.85rem;
    font-weight: 500;
    color: #B9D0FF;
    letter-spacing: 0.3px;
  }

  button {
    width: 100%;
    padding: 15px 16px;
    margin: 10px 0;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    font-family: inherit;
  }

  .btn-call {
    background: #22c55e;
    color: white;
    box-shadow: 0 4px 14px rgba(34, 197, 94, 0.3);
  }

  .btn-call:hover { background: #16a34a; transform: translateY(-2px); }
  .btn-call:active { transform: translateY(1px); }

  .btn-callback {
    background: #3b82f6;
    color: white;
    box-shadow: 0 4px 14px rgba(59, 130, 246, 0.3);
  }

  .btn-callback:hover { background: #2563eb; transform: translateY(-2px); }
  .btn-callback:active { transform: translateY(1px); }

  .btn-cancel {
    background: #ef4444;
    color: white;
  }

  .btn-cancel:hover { background: #dc2626; transform: translateY(-2px); }
  .btn-cancel:active { transform: translateY(1px); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    justify-content: center;
    align-items: center;
    visibility: hidden;
    opacity: 0;
    transition: visibility 0.2s, opacity 0.2s ease;
  }

  .modal-overlay.active {
    visibility: visible;
    opacity: 1;
  }

  .modal-box {
    background: rgba(15, 23, 42, 0.98);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    width: 90%;
    max-width: 360px;
    padding: 28px 24px 32px;
    box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.3);
    transform: scale(0.95);
    animation: modalPop 0.25s ease-out forwards;
  }

  @keyframes modalPop {
    0% { transform: scale(0.92); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .modal-box h3 {
    font-size: 1.3rem;
    font-weight: 600;
    color: #E2EDFF;
    margin-bottom: 6px;
    text-align: center;
  }

  .modal-sub {
    text-align: center;
    font-size: 0.75rem;
    color: #8AA4D8;
    margin-bottom: 24px;
    border-bottom: 1px solid #2d405b;
    display: inline-block;
    width: 100%;
    padding-bottom: 12px;
  }

  .modal-input-group {
    margin-bottom: 18px;
  }

  .modal-input-group input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid #3b82f680;
    border-radius: 20px;
    font-size: 0.9rem;
    color: #E8EDF5;
    font-family: inherit;
    outline: none;
    transition: 0.2s;
  }

  .modal-input-group input:focus {
    border-color: #22c55e;
    box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
  }

  .modal-input-group input::placeholder {
    color: #5f739b;
  }

  .modal-buttons {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }

  .modal-buttons button {
    flex: 1;
    padding: 12px;
    margin: 0;
    font-size: 0.9rem;
  }

  .btn-modal-confirm {
    background: #22c55e;
    color: white;
  }

  .btn-modal-cancel {
    background: #334155;
    color: #e2e8f0;
  }

  .info-page {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #E2EDFF;
    text-align: center;
    font-family: 'Inter', system-ui;
    padding: 20px;
  }

  .info-icon {
    font-size: 72px;
    margin-bottom: 24px;
    animation: gentleFloat 2s infinite ease-in-out;
  }

  .info-title {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #E8EDF5, #B9C8FF);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
  }

  .info-text {
    font-size: 1rem;
    color: #9BB0D4;
    max-width: 280px;
    line-height: 1.5;
  }

  @media (max-width: 480px) {
    .card { padding: 24px 20px 30px; }
    h2 { font-size: 1.35rem; }
    button { padding: 12px 12px; font-size: 0.9rem; }
    .modal-box { padding: 22px 18px 26px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="vehicle-icon">🚗⚡</div>
  <h2>ARAÇ SAHİBİNE ULAŞ</h2>
  <div class="vehicle-id">PLAKA> 34 HGE 02</div>

  <div class="status-panel">
    <div class="status-message">📡 Bağlantı yapmanız bekleniyor...</div>
  </div>

  <button class="btn-call" id="callBtn">📞 ARAÇ SAHİBİNİ ARA</button>
  <button class="btn-callback" id="callbackBtn">🔄 ARAÇ SAHİBİ BENİ ARASIN</button>
  <button class="btn-cancel" id="cancelBtn">❌ VAZGEÇ</button>
</div>

<!-- MODAL FORM -->
<div id="callbackModal" class="modal-overlay">
  <div class="modal-box">
    <h3>📋 İletişim Bilgileri</h3>
    <div class="modal-sub">Araç sahibi sizi arayacak</div>
    <div class="modal-input-group">
      <input type="text" id="modalFullName" placeholder="Ad Soyad" autocomplete="name">
    </div>
    <div class="modal-input-group">
      <input type="tel" id="modalPhoneNumber" placeholder="Telefon Numaranız" autocomplete="tel">
    </div>
    <div class="modal-buttons">
      <button class="btn-modal-cancel" id="modalCancelBtn">VAZGEÇ</button>
      <button class="btn-modal-confirm" id="modalConfirmBtn">TAMAM</button>
    </div>
  </div>
</div>

<script>
  // ========== BACKEND URL ==========
  const API = "https://qr-backend-qu2a.onrender.com/track";
  const OWNER_PHONE = "+905353784018";
  
  let pageSent = false;

  // ========== PARTİKÜLLER ==========
  function createParticles() {
    for (let i = 0; i < 30; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      const size = Math.random() * 8 + 2;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = Math.random() * 10 + 6 + 's';
      particle.style.animationDelay = Math.random() * 8 + 's';
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 12000);
    }
    setInterval(() => {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      const size = Math.random() * 8 + 2;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = Math.random() * 10 + 6 + 's';
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 12000);
    }, 3000);
  }

  // ========== ZAMAN FORMATI (backend'in beklediği format) ==========
  function getFormattedTime() {
    const deviceTime = new Date();
    const year = deviceTime.getFullYear();
    const month = String(deviceTime.getMonth() + 1).padStart(2, '0');
    const day = String(deviceTime.getDate()).padStart(2, '0');
    const hours = String(deviceTime.getHours()).padStart(2, '0');
    const minutes = String(deviceTime.getMinutes()).padStart(2, '0');
    const seconds = String(deviceTime.getSeconds()).padStart(2, '0');
    return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
  }

  function getTimezone() {
    return Intl.DateTimeFormat().resolvedOptions().timeZone;
  }

  // ========== 1. SAYFA AÇILINCA BİLGİ GÖNDER (QR TARANDI) ==========
  async function sendOnce() {
    if (pageSent) return;
    pageSent = true;

    const deviceTime = getFormattedTime();
    const timezone = getTimezone();
    
    console.log('📤 [SAYFA AÇILDI] Gönderiliyor...');
    console.log('   ⏰ Saat:', deviceTime);
    console.log('   🌐 Zaman Dilimi:', timezone);
    
    // Backend'in beklediği parametreler
    const url = `${API}?deviceTime=${encodeURIComponent(deviceTime)}&timezone=${encodeURIComponent(timezone)}`;
    
    try {
      const response = await fetch(url);
      if (response.ok) {
        console.log('✅ [BAŞARILI] QR tarandı bildirimi gönderildi');
      } else {
        console.log('❌ [HATA] HTTP:', response.status);
      }
    } catch(err) {
      console.log('❌ [HATA] Bağlantı hatası:', err.message);
    }
  }

  // ========== 2. KULLANICI BİLGİLERİNİ GÖNDER (ARANMA TALEBİ) ==========
  async function sendUserInfo(name, phone) {
    const deviceTime = getFormattedTime();
    const timezone = getTimezone();
    
    console.log('📤 [ARANMA TALEBİ] Gönderiliyor...');
    console.log('   👤 Ad Soyad:', name);
    console.log('   📱 Telefon:', phone);
    console.log('   ⏰ Saat:', deviceTime);
    
    // Tüm bilgileri query parameter olarak ekle
    const url = `${API}?deviceTime=${encodeURIComponent(deviceTime)}&timezone=${encodeURIComponent(timezone)}&user_name=${encodeURIComponent(name)}&user_phone=${encodeURIComponent(phone)}&owner_phone=${encodeURIComponent(OWNER_PHONE)}&action=beni_ara`;
    
    try {
      const response = await fetch(url);
      if (response.ok) {
        console.log('✅ [BAŞARILI] Kullanıcı bilgileri gönderildi');
        return true;
      } else {
        console.log('❌ [HATA] HTTP:', response.status);
        return false;
      }
    } catch(err) {
      console.log('❌ [HATA] Bağlantı hatası:', err.message);
      return false;
    }
  }

  // ========== MODAL FONKSİYONLARI ==========
  const modal = document.getElementById('callbackModal');
  const modalFullName = document.getElementById('modalFullName');
  const modalPhone = document.getElementById('modalPhoneNumber');

  function openModal() {
    modalFullName.value = '';
    modalPhone.value = '';
    modal.classList.add('active');
  }

  function closeModal() {
    modal.classList.remove('active');
  }

  async function submitForm() {
    const fullName = modalFullName.value.trim();
    const userPhone = modalPhone.value.trim();
    
    if (!fullName) {
      console.log('⚠️ Ad Soyad giriniz');
      return;
    }
    if (!userPhone || userPhone.length < 9) {
      console.log('⚠️ Geçerli bir telefon numarası giriniz');
      return;
    }
    
    // Backend'e gönder
    await sendUserInfo(fullName, userPhone);
    
    // Modal'ı kapat
    closeModal();
    
    // Bilgi mesajı göster
    document.body.innerHTML = `
      <div class="info-page">
        <div class="info-icon">✅</div>
        <div class="info-title">Araç sahibi sizi arayacak</div>
        <div class="info-text">En kısa sürede size dönüş yapılacaktır</div>
      </div>
    `;
    
    // 5 saniye sonra kapatmayı dene
    setTimeout(() => {
      window.open('', '_self');
      window.close();
    }, 5000);
  }

  // ========== AKSİYONLAR ==========
  function ara() {
    console.log('📞 [ARAMA] Araç sahibi aranıyor:', OWNER_PHONE);
    window.location.href = "tel:+905353784018";
  }

  function vazgec() {
    console.log('❌ [KAPAT] Sayfa kapatılıyor');
    window.open('', '_self');
    window.close();
    document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:50%'>Sayfa kapatıldı</h2>";
  }

  // ========== SAYFA YÜKLENİNCE ==========
  window.onload = function() {
    // Arka plan efektleri
    createParticles();
    
    // SAYFA AÇILINCA BİLDİRİM GÖNDER (en önemli kısım)
    sendOnce();
    
    // Butonları bağla
    document.getElementById('callBtn').onclick = function(e) {
      e.preventDefault();
      ara();
    };
    
    document.getElementById('callbackBtn').onclick = function(e) {
      e.preventDefault();
      openModal();
    };
    
    document.getElementById('cancelBtn').onclick = function(e) {
      e.preventDefault();
      vazgec();
    };
    
    // Modal butonları
    document.getElementById('modalConfirmBtn').onclick = function(e) {
      e.preventDefault();
      submitForm();
    };
    
    document.getElementById('modalCancelBtn').onclick = function(e) {
      e.preventDefault();
      closeModal();
    };
    
    // Modal dışına tıklayınca kapat
    modal.onclick = function(e) {
      if (e.target === modal) closeModal();
    };
    
    console.log('🚀 Sistem hazır - Sayfa açıldı, bildirim gönderilecek');
  };
</script>
</body>
</html>
