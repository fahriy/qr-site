<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Araç Sistemi</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:350px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
  margin-bottom:20px;
}

p{
  margin-bottom:20px;
  color:#ccc;
}

button{
  width:100%;
  padding:15px;
  margin:10px 0;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition: transform 0.2s;
}

.call{
  background:#22c55e;
  color:white;
}

.cancel{
  background:#ef4444;
  color:white;
}

button:active{
  transform:scale(0.98);
}
</style>
</head>

<body>

<div class="card">
  <h2>🚗 Araç Sahibine Ulaş</h2>
  <p>Bağlantı kuruluyor...</p>

  <button class="call" onclick="ara()">📞 ARA</button>
  <button class="cancel" onclick="vazgec()">❌ VAZGEÇ</button>
</div>

<script>

// BACKEND URL (Render)
const API = "https://qr-backend-qu2a.onrender.com/track";

// SADECE 1 KEZ
let sent = false;

async function sendOnce(){
  if(sent) return;
  sent = true;

  // 📱 Cihazın saatini al (yerel saat)
  const deviceTime = new Date();
  const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  
  // Yerel saat formatında gönder (ISO değil, direkt okunabilir format)
  const year = deviceTime.getFullYear();
  const month = String(deviceTime.getMonth() + 1).padStart(2, '0');
  const day = String(deviceTime.getDate()).padStart(2, '0');
  const hours = String(deviceTime.getHours()).padStart(2, '0');
  const minutes = String(deviceTime.getMinutes()).padStart(2, '0');
  const seconds = String(deviceTime.getSeconds()).padStart(2, '0');
  
  // Backend'e gönderilecek format: "2026-04-26 01:55:02"
  const formattedTime = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
  
  // Debug için konsola yaz
  console.log('📱 Cihaz Saati (yerel):', deviceTime.toLocaleString('tr-TR'));
  console.log('📤 Gönderilen saat:', formattedTime);
  console.log('🌐 Zaman Dilimi:', timezone);
  
  // GET isteği olarak query parameter'lara ekle
  const url = `${API}?deviceTime=${encodeURIComponent(formattedTime)}&timezone=${encodeURIComponent(timezone)}`;
  
  try {
    const response = await fetch(url);
    if (response.ok) {
      console.log('✅ Bilgiler başarıyla gönderildi');
    } else {
      console.log('❌ Gönderme hatası:', response.status);
    }
  } catch(err) {
    console.log('❌ Bağlantı hatası:', err);
  }
}

// Sayfa yüklendiğinde çalıştır
window.onload = sendOnce;

function ara(){
  window.location.href = "tel:+905353784018";
}

function vazgec(){
  window.open('','_self');
  window.close();
  // Bazı tarayıcılarda close çalışmazsa:
  document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:50%'>Sayfa kapatıldı</h2>";
}

</script>

</body>
</html>
